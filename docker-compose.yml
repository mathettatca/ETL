x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: sts-data-ingestion-airflow:local
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW__CORE__AUTH_MANAGER:-airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS:-admin:admin}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE:-/opt/airflow/config/simple_auth_manager_passwords.json}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:-postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-false}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION:-true}
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: ${AIRFLOW__CORE__EXECUTION_API_SERVER_URL:-http://airflow-apiserver:8080/execution/}
    AIRFLOW__API__BASE_URL: ${AIRFLOW__API__BASE_URL:-http://airflow-apiserver:8080}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY:-local-dev-airflow-api-secret-key-please-change-me-64-bytes-minimum}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-local-dev-airflow-api-auth-jwt-secret-please-change-me-64-bytes-minimum}
    AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: ${AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT:-8793}
    AIRFLOW__SMTP__SMTP_HOST: ${AIRFLOW__SMTP__SMTP_HOST:-smtp.gmail.com}
    AIRFLOW__SMTP__SMTP_STARTTLS: ${AIRFLOW__SMTP__SMTP_STARTTLS:-True}
    AIRFLOW__SMTP__SMTP_SSL: ${AIRFLOW__SMTP__SMTP_SSL:-False}
    AIRFLOW__SMTP__SMTP_PORT: ${AIRFLOW__SMTP__SMTP_PORT:-587}
    AIRFLOW__SMTP__SMTP_USER: ${AIRFLOW__SMTP__SMTP_USER:-}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${AIRFLOW__SMTP__SMTP_PASSWORD:-}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${AIRFLOW__SMTP__SMTP_MAIL_FROM:-}
    AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
    AIRFLOW__EMAIL__EMAIL_CONN_ID: ${AIRFLOW__EMAIL__EMAIL_CONN_ID:-smtp_default}
    AIRFLOW__EMAIL__FROM_EMAIL: ${AIRFLOW__EMAIL__FROM_EMAIL:-}
    AIRFLOW_CONN_SMTP_DEFAULT: >-
      {"conn_type":"smtp","host":"${AIRFLOW__SMTP__SMTP_HOST:-smtp.gmail.com}","login":"${AIRFLOW__SMTP__SMTP_USER:-}","password":"${AIRFLOW__SMTP__SMTP_PASSWORD:-}","port":${AIRFLOW__SMTP__SMTP_PORT:-587},"extra":{"disable_ssl":true,"disable_tls":false,"from_email":"khoinm0603@gmail.com"}}
    AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: ${AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT:-google-cloud-platform://?scope=https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fdrive.readonly}
    PYTHONPATH: /opt/airflow/src
    MONGO_HOST: mongo
    MONGO_PORT: 27017
    MONGO_DB_NAME: ${MONGO_DB_NAME:-etl_pipeline_db}
    MONGO_TIMEOUT: ${MONGO_TIMEOUT:-5000}
    POSTGRES_HOST: app-postgres
    POSTGRES_PORT: 5432
    POSTGRES_USER: ${APP_POSTGRES_USER:-sts}
    POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD:-sts}
    POSTGRES_DB: ${APP_POSTGRES_DB:-sts_beyond}
    GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/opt/airflow/google_tokens/client_secret.json}
    GOOGLE_CREDENTIALS_PATH: ${GOOGLE_CREDENTIALS_PATH:-/opt/airflow/google_tokens/client_secret.json}
    GOOGLE_DRIVE_BOOTSTRAP_SCRIPT: ${GOOGLE_DRIVE_BOOTSTRAP_SCRIPT:-/opt/airflow/scripts/bootstrap_google_drive.py}
    FAILURE_EMAIL: ${FAILURE_EMAIL:-khoinm0603@gmail.com}
    PIPELINE_SUMMARY_EMAIL: ${PIPELINE_SUMMARY_EMAIL:-khoinm0603@gmail.com}
    AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-airflow}
    AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
    AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-Airflow}
    AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-Admin}
    AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-khoinm0603@gmail.com}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./logs:/opt/airflow/logs
    - ./client_secret.json:/opt/airflow/client_secret.json:ro
    - ./google_tokens:/opt/airflow/google_tokens
    - airflow-config:/opt/airflow/config
    - ./config/simple_auth_manager_passwords.json:/opt/airflow/bootstrap/simple_auth_manager_passwords.json:ro
    - ./scripts/entrypoint-init.sh:/opt/airflow/scripts/entrypoint-init.sh:ro
    - ./scripts/bootstrap_google_drive.py:/opt/airflow/scripts/bootstrap_google_drive.py:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-postgres:
      condition: service_healthy
    mongo:
      condition: service_healthy
    app-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  app-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${APP_POSTGRES_USER:-sts}
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD:-sts}
      POSTGRES_DB: ${APP_POSTGRES_DB:-sts_beyond}
    ports:
      - "${APP_POSTGRES_PORT:-5434}:5432"
    volumes:
      - app-postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${APP_POSTGRES_USER:-sts}", "-d", "${APP_POSTGRES_DB:-sts_beyond}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  mongo:
    image: mongo:7
    ports:
      - "${MONGO_PORT_HOST:-27017}:27017"
    volumes:
      - mongo-db-volume:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: always

  airflow-init:
    <<: *airflow-common
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - /opt/airflow/scripts/entrypoint-init.sh
    restart: "no"

  airflow-apiserver:
    <<: *airflow-common
    command:
      - api-server
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    restart: always
    depends_on:
      airflow-postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    hostname: airflow-scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: always
    depends_on:
      airflow-postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: always
    depends_on:
      airflow-postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-postgres-db-volume:
  app-postgres-db-volume:
  mongo-db-volume:
  airflow-config:
